# 小鸟游刘网（程序员少女）·个人线

[[step]]
id = "liuwang_start"
text = """
==================================================
                 小鸟游刘网 个人线
==================================================
"""

[[step]]
id = "liuwang_begin"
text = "按回车开始……"
next = "liuwang_intro"

[[step]]
id = "liuwang_intro"
text = """
你第一次注意到小鸟游刘网，是在教室靠窗的最后一排。
她总是戴着黑框眼镜，盯着笔记本电脑屏幕，手指飞快地敲着键盘。
周围的同学聊着游戏、偶像、周末去哪玩，她却像另一个世界的人。
你听说她是个天才程序员，初中就开始写开源项目，还拿过竞赛奖。
但在这个班里，她却是被孤立的对象。
"""

[[step]]
id = "liuwang_choice1"
text = "【选择题：你会怎么看待她？】"
choices = [
    { text = "好厉害！我想和她做朋友", goto = "liuwang_friend", modifiers = { "like.小鸟游刘网" = 15 } },
    { text = "有点可怜，但也不关我的事吧……", goto = "liuwang_ignore", modifiers = { "like.小鸟游刘网" = 0 } }
]

[[step]]
id = "liuwang_friend"
text = "你主动坐到她旁边，刘网抬起头，眼神里闪过一丝惊讶和……戒备。"
next = "liuwang_bullying"

[[step]]
id = "liuwang_ignore"
text = "你从她身边走过，没有停留。刘网低头继续敲键盘，手指却慢了半拍。"
next = "liuwang_bullying"

[[step]]
id = "liuwang_bullying"
text = """
【霸凌的阴影】
很快你发现，刘网在班里并不只是“被无视”那么简单。
班长小团体经常嘲笑她的打扮、她的代码、她的一切。
“天天写那些破代码，有什么用啊？”“怪不得没朋友，怪人一个。”
还有人故意藏她的鼠标、拔她的电源线，甚至在课本上写“程序员滚出班级”。
刘网每次都默默忍受，从不反驳，只是把课本擦干净，继续埋头写代码。

一天午休，你看到刘网的桌子被泼了水，键盘全湿了。
她蹲在地上，一个一个键帽拆下来擦干，眼泪在眼眶里打转。
"""

[[step]]
id = "liuwang_choice2"
text = "【选择题：你要怎么做？】"
choices = [
    { text = "走过去，递给她纸巾，帮她一起擦键盘", goto = "liuwang_help", modifiers = { "like.小鸟游刘网" = 20 } },
    { text = "去报告老师，让老师来处理", goto = "liuwang_report", modifiers = { "like.小鸟游刘网" = 5 } }
]

[[step]]
id = "liuwang_help"
text = """
刘网抬头看你，泪水终于落了下来：为什么……要帮我？
你笑了笑：因为我们是同学啊。
"""
next = "liuwang_after_help"

[[step]]
id = "liuwang_report"
text = """
你跑去办公室，老师只是皱眉说“知道了”，却没有真正处理。
回来后，刘网的桌子已经被搬到了教室最后一排的角落。
她看你一眼，什么也没说。
"""
next = "liuwang_after_help"

[[step]]
id = "liuwang_after_help"
text = """
从那以后，你开始主动和她说话。
你发现她其实很健谈，只是太久没人愿意听她讲代码、讲算法。
她给你看她写的程序——一个可以自动生成画作的AI，一个能分析情绪的小工具。
你惊叹不已，刘网害羞地推了推眼镜：其实……也没什么厉害的。

但霸凌并没有停止。
班长带人把她从小组讨论中排挤出去，说“我们不需要你这种怪人”。
还有人把她写的代码截图发到班级群，嘲讽“这水平也好意思自称程序员”。
刘网越来越沉默，甚至开始逃课。

一天放学后，你在学校天台找到了她。
她坐在护栏边，风吹起她的长发，眼神空洞。
小鸟游刘网：你说……我是不是真的不适合待在这里？
小鸟游刘网：也许他们说得对，我就是一个没用的怪人。
"""

[[step]]
id = "liuwang_key_choice"
text = "【关键选择：你要怎么回应？】"
choices = [
    { text = "愤怒地说：“他们才是混蛋！走，我陪你去找校长！”", goto = "liuwang_bad", modifiers = {} },
    { text = "坐在她旁边，轻轻说：“不是的。你是我见过最酷的人。”", goto = "liuwang_good", modifiers = {} }
]

[[step]]
id = "liuwang_bad"
text = """
你拉着刘网冲进校长室，把事情原原本本说了出来。
校长叫来了班长等人，严厉批评了他们。
班长们表面道歉，眼神里却满是怨恨。

第二天，更猛烈的报复开始了。
有人在班级群里造谣刘网“作弊”，有人趁她不注意删掉了她U盘里所有代码。
刘网崩溃了，她把自己关在家里，再也不来学校。
你打电话、发消息，她都不回。
一周后，你收到她的一封邮件：
“谢谢你为我做的一切。但我已经累了。我想去一个没有人认识我的地方。再见。”
从那以后，小鸟游刘网转学了，再也没有任何消息。
你站在空荡荡的天台上，风吹过，却再也带不回那个女孩。

【结局：消失的风】
你每次打开电脑，都会想起她敲键盘的样子。
你才明白，有时候冲动不是勇气，陪伴才是。
==================================================
           小鸟游刘网 · Bad ENDing 消失的风
==================================================
"""
next = "END"

[[step]]
id = "liuwang_good"
text = """
你坐到她旁边，没有拉她走，也没有说教。
你只是陪她看夕阳，听风的声音。
过了很久，你开口：刘网，你写的那个AI画图程序，能教我吗？
刘网愣了一下，眼泪又流了下来，但这次她笑了。
她点点头：好。

从那天起，你开始跟她学编程。
你们每天放学后都在空教室里，她教你Python、算法、Git。
你学得很慢，但她从不会不耐烦。
慢慢地，刘网的代码里开始出现有趣的注释：“# 今天教笨蛋写了第一个函数”
你也开始帮她在班里发声，不是吵架，而是让大家看到她的才华。
你向班主任建议举办一次“班级编程小展”，让刘网展示她的作品。
当同学们看到刘网写的游戏和小工具时，不少人发出惊叹：“原来这么厉害！”
班长的小团体渐渐没了声音，因为其他同学开始认可刘网。

毕业典礼那天，刘网送你一个U盘。
里面是一个程序——打开后，屏幕上出现一行行文字，记录着你们从相识到现在的每一天。
最后一行写着：谢谢你没有放弃我。你是我生命中最重要的……朋友。
你转头看她，她的眼睛亮晶晶的。
小鸟游刘网：其实……我喜欢你。从你帮我擦键盘那天就喜欢了。
小鸟游刘网：但我怕说出来，连朋友都做不成……
你握住她的手：笨蛋，我也喜欢你。
她扑进你怀里，哭得像个小孩。

【结局：代码与风】
你们一起考上了同一所大学，一起写代码，一起面对世界。
霸凌的阴影早已散去，因为你们是彼此最坚固的城墙。
她的代码里多了一个变量——你的名字。
==================================================
           小鸟游刘网 · Happy ENDing 代码与风
==================================================
"""
next = "END"