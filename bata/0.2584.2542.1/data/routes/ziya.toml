# 千日坂芷芽（绘画少女）·个人线

[[step]]
id = "ziya_start"
text = """
==================================================
                   千日坂芷芽 个人线
==================================================
"""

[[step]]
id = "ziya_begin"
text = "按回车开始……"
next = "ziya_intro"

[[step]]
id = "ziya_intro"
text = """
你越来越常注意到窗边画画的戴着耳机的少女。
她安静、温柔、话少，却总能用画笔表达一切。
你开始主动留在教室，陪她一起画画。
"""

[[step]]
id = "ziya_choice1"
text = "【选择题：你想怎么夸她的画？】"
choices = [
    { text = "你的画好温柔，像你一样", goto = "ziya_praise1", modifiers = { "like.千日坂芷芽" = 15 } },
    { text = "画得好厉害，我好佩服", goto = "ziya_praise2", modifiers = { "like.千日坂芷芽" = 8 } }
]

[[step]]
id = "ziya_praise1"
text = "千日坂芷芽耳朵微微发红：……谢谢。"
next = "ziya_evening"

[[step]]
id = "ziya_praise2"
text = "千日坂芷芽轻轻点头：谢谢你的认可。"
next = "ziya_evening"

[[step]]
id = "ziya_evening"
text = """
某天傍晚，教室里只剩下你们两个人。
千日坂芷芽：其实……我一直很害怕，联盟会消失。
千日坂芷芽：所以我想把这里的每一天都画下来。
你安静地听着，第一次看到她如此脆弱的一面。
"""

[[step]]
id = "ziya_choice2"
text = "【选择题：你想怎么做？】"
choices = [
    { text = "轻轻握住她的手", goto = "ziya_hold", modifiers = { "like.千日坂芷芽" = 20 } },
    { text = "温柔安慰她", goto = "ziya_comfort", modifiers = { "like.千日坂芷芽" = 10 } }
]

[[step]]
id = "ziya_hold"
text = "芷芽身体一颤，却没有躲开。"
next = "ziya_ai_incident"

[[step]]
id = "ziya_comfort"
text = "芷芽轻轻点头，眼神变得安心。"
next = "ziya_ai_incident"

[[step]]
id = "ziya_ai_incident"
text = """
有一次，你发现芷芽在那非常生气
你靠近问：“怎么了？”
芷芽拿着平板给你看
原来芷芽因为发布的作品质量太高了
被别人质疑是AI生成的
还有一些人造假，说芷芽的画作使用了200+个AI模型
此时，你会怎么做？
"""
choices = [
    { text = "愤怒的说到：“这些用户是人类吗？芷芽酱辛辛苦苦搞的作品，却被你们这群身上长满蛔虫的狗造谣说成ai！！！”", goto = "ziya_bad", modifiers = { "like.千日坂芷芽" = 10 } },
    { text = "摸着她的脸安慰到：“没事的，每个人把自己的作品发布都会被质疑和辱骂，这是正常的”", goto = "ziya_good", modifiers = { "like.千日坂芷芽" = 15 } }
]

[[step]]
id = "ziya_bad"
text = """
芷芽对此愤愤不平
从那天起，芷芽慢慢的不喜欢说话了
过了一些天，社团宣布解散

【结局：消失的芷芽】
从此，芷芽永远消失在了这个世界
你也变成了孤独的人
==================================================
           千日坂芷芽 · Bad ENDing 消失的芷芽
==================================================
"""
next = "END"

[[step]]
id = "ziya_good"
text = """
芷芽抱住了你，连忙道谢
从那天起，你们之间的距离彻底打破。
她会主动给你看她的新画，画里渐渐开始出现你的身影。
夕阳下，她突然停下画笔，看向你。
千日坂芷芽：我……我喜欢你。
千日坂芷芽：不是伙伴，是想一直在一起的那种喜欢。

【结局：画师的依靠】
你们一起守护着小小的联盟。
她画着世界，而你的世界里，只有她。
==================================================
           千日坂芷芽 · Happy ENDing 画师的依靠
==================================================
"""
next = "END"