# 棱斯新耀羽（冰棍少女）·个人线

[[step]]
id = "yaoyu_start"
text = """
==================================================
                棱斯新耀羽 个人线
==================================================
"""

[[step]]
id = "yaoyu_begin"
text = "按回车开始……"
next = "yaoyu_intro"

[[step]]
id = "yaoyu_intro"
text = """
耀羽是联盟里最耀眼的存在。
她走到哪里都像带着一束光，笑容灿烂得让人睁不开眼。
但很少有人知道，她的家境并不好。
那天放学后，你看到她蹲在便利店门口，盯着冰柜里的雪糕发呆。
你走过去，她慌忙站起来，笑着说：没事没事，我就看看！
但你看到她眼里的渴望，像星星一样闪了一下又灭了。
"""

[[step]]
id = "yaoyu_choice1"
text = "【选择题：你会怎么做？】"
choices = [
    { text = "买一根雪糕递给她，说“请你吃”", goto = "yaoyu_buy", modifiers = { "like.棱斯新耀羽" = 15 } },
    { text = "问她“你是不是想吃冰棍？”", goto = "yaoyu_ask", modifiers = { "like.棱斯新耀羽" = 8 } }
]

[[step]]
id = "yaoyu_buy"
text = """
耀羽愣了一下，然后脸红了：谢……谢谢！
她咬了一口，眼睛弯成月牙：好甜！
"""
next = "yaoyu_plan"

[[step]]
id = "yaoyu_ask"
text = "耀羽摇摇头：没有啦……我只是在想，如果能卖冰棍就好了。"
next = "yaoyu_plan"

[[step]]
id = "yaoyu_plan"
text = """
【摆摊计划】
耀羽认真地对你说：我想摆个冰棍摊，赚点钱。
她的眼睛亮亮的：我算过了，一根冰棍成本五毛，卖两块，一天卖一百根的话……
她掰着手指算账的样子，可爱得像个小学生。
你决定帮她。

你们一起去找二手冰柜，一起去批发市场进货。
耀羽很会挑口味：绿豆的解暑，草莓的甜，巧克力的受欢迎。
她还在纸板上画了招牌，写着“耀羽冰棍，一口回到夏天”。
你的任务是帮她推冰柜、喊吆喝。
"""

[[step]]
id = "yaoyu_choice2"
text = "【选择题：第一天摆摊，生意不好，你会……】"
choices = [
    { text = "安慰她“没关系，第一天都这样”", goto = "yaoyu_comfort", modifiers = { "like.棱斯新耀羽" = 10 } },
    { text = "主动去路边发传单拉客", goto = "yaoyu_advertise", modifiers = { "like.棱斯新耀羽" = 20 } }
]

[[step]]
id = "yaoyu_comfort"
text = "耀羽点点头，眼眶有点红：嗯……有你陪着就好。"
next = "yaoyu_business"

[[step]]
id = "yaoyu_advertise"
text = """
你拿着传单跑到路口，见人就发。
十分钟后，带回来五个顾客。
耀羽高兴得跳起来：你太厉害了！
"""
next = "yaoyu_business"

[[step]]
id = "yaoyu_business"
text = """
【生意红火】
日子一天天过去，冰棍摊的生意越来越好。
耀羽开发了新口味：芒果、椰子、甚至还有咸蛋黄的。
你们在摊位旁放了两个小板凳，等客人的时候就并排坐着聊天。
她告诉你，她妈妈生病了，她想赚够医药费。
你第一次看到她哭，眼泪掉在冰柜上，很快就结了一层霜。
"""

[[step]]
id = "yaoyu_last_day"
text = """
【最后一天】
终于，攒够了钱。耀羽说，今天是最后一天摆摊。
收摊时，她递给你一根冰棍：这是特别口味的，只有你有。
你咬了一口，是草莓味的，很甜。
耀羽笑着说：以后……我们开一家真正的冰棍店吧。
你点头：好，我当你的合伙人。

回家的路上，耀羽推着冰柜走在前面。
她回头看你，夕阳把她的影子拉得很长。
她喊：快点啊，我请你吃晚饭！
你笑着追上去。
就在这时，一辆闯红灯的货车冲了过来。
"""

[[step]]
id = "yaoyu_key_choice"
text = "【关键选择：生死瞬间，你会……】"
choices = [
    { text = "推开耀羽", goto = "yaoyu_good", modifiers = {} },
    { text = "愣在原地", goto = "yaoyu_bad", modifiers = {} }
]

[[step]]
id = "yaoyu_bad"
text = """
你愣住了，脚像钉在地上一样。
耀羽看到了，她扔下冰柜朝你冲过来。
她推开了你。
货车撞上了她。
冰柜碎了，冰棍洒了一地，慢慢融化在滚烫的马路上。
你抱着她，她的血染红了你的校服。
她最后看了你一眼，嘴唇动了动，但没有发出声音。
你凑近，听到她说了两个字：……冰棍……
然后她的眼睛闭上了。

后来的后来，你开了一家冰棍店。
店里只卖一种口味——草莓味的。
招牌上写着：耀羽冰棍，一口回到夏天。
每个路过的客人都会问：为什么只有草莓味？
你笑着说：因为这是她最喜欢的味道。
但你没说的是，那个夏天，永远回不去了。

【结局：融化的夏天】
耀羽再也没有睁开眼。
而你，余生都在卖草莓味的冰棍。
==================================================
           棱斯新耀羽 · Bad ENDing 融化的夏天
==================================================
"""
next = "END"

[[step]]
id = "yaoyu_good"
text = """
你没有犹豫，冲上去一把推开了耀羽。
她摔倒在路边，冰柜翻倒，冰棍滚了一地。
你听到刺耳的刹车声，然后是一阵剧痛。
你飞了出去，落在几米外的地上。
视线渐渐模糊，你看到耀羽哭着朝你跑来。
她跪在你身边，手在发抖：不要死……求你不要死……
你笑了：没事……你不是要请我吃晚饭吗……
然后你晕了过去。

醒来时，你在医院里。
耀羽趴在床边睡着了，脸上还挂着泪痕。
你轻轻摸了摸她的头发，她立刻惊醒。
她看到你睁着眼，扑进你怀里大哭：你吓死我了！
你笑着说：我命大。
医生说，你断了两根肋骨，但命保住了。

【发家致富】
出院那天，耀羽推着轮椅来接你。
她说：医药费我出，因为你是为了救我才受伤的。
你摇头：不，那是我们冰棍摊赚的钱，本来就是你妈妈的医药费。
她笑了：那就当是我们一起出的。

你们用剩下的钱，真的开了一家冰棍店。
店面很小，但耀羽把它打扮得很漂亮。
墙上贴着她画的招牌，冰柜里摆满了各种口味的冰棍。
生意越来越好，从一家店开到两家、三家。
三年后，“耀羽冰棍”成了整座城市最火的冷饮品牌。
耀羽的妈妈也治好了病，每天在店里帮忙收银。

开业五周年那天，耀羽站在店门口，递给你一根冰棍。
她脸红红的：这是新口味，你尝尝。
你咬了一口，是草莓味的，但比以前的更甜。
耀羽低下头：我加了双倍的糖……因为……
她深吸一口气：因为和你在一起的每一天，都像加了双倍糖。
你愣了一下，然后笑了：那我们以后的每一天，都要加双倍糖。

【结局：发家致富】
你们一起把“耀羽冰棍”开到了全国。
她负责研发新口味，你负责管理店铺。
每个夏天，你们都会回到那个路口，在原来的位置摆一天摊。
只卖一种口味——草莓味的。
耀羽说：那是我们开始的地方。
你说：也是我为你挡货车的地方。
她锤了你一下：不许再提了，吓死我了。
你笑着说：好，不提。
但你心里知道，如果重来一次，你还会冲上去。
因为她是耀羽，是你愿意用命去换的人。
==================================================
           棱斯新耀羽 · Happy ENDing 发家致富
==================================================
"""
next = "END"