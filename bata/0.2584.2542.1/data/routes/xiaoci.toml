# 渚浔笑辞（料理少女）·个人线

[[step]]
id = "xiaoci_start"
text = """
==================================================
                   渚浔笑辞 个人线
==================================================
"""

[[step]]
id = "xiaoci_begin"
text = "按回车开始……"
next = "xiaoci_intro"

[[step]]
id = "xiaoci_intro"
text = """
笑辞是联盟里的小太阳，最喜欢给大家做点心。
她的笑容和她做的料理一样，温暖又治愈。
你每天都期待和她一起度过的时光。
"""

[[step]]
id = "xiaoci_egg_tart"
text = """
有一天，她来你家玩，送你了一块蛋挞。

【选择题：她把蛋挞送到你的嘴里，问：好吃吗？】
"""
choices = [
    { text = "超级好吃！和你一样甜！", goto = "xiaoci_sweet", modifiers = { "like.渚浔笑辞" = 15 } },
    { text = "谢谢，我会好好品尝", goto = "xiaoci_thank", modifiers = { "like.渚浔笑辞" = 8 } }
]

[[step]]
id = "xiaoci_sweet"
text = "笑辞脸颊一红：讨厌啦～"
next = "xiaoci_development"

[[step]]
id = "xiaoci_thank"
text = "笑辞开心地笑了：太好了！"
next = "xiaoci_development"

[[step]]
id = "xiaoci_development"
text = """
【个人线·发展】
你渐渐发现，笑辞的笑容背后也有疲惫。
她总是努力让所有人开心，却常常忘了照顾自己。
你开始主动陪她一起准备料理、收拾厨房。
"""

[[step]]
id = "xiaoci_burnt"
text = """
有一次，她把菜烧糊了，她看着烧糊的菜，哭着说到：“我是不是很没用啊？”

【选择题：你该怎么做】
"""
choices = [
    { text = "抱住她，说：“没事的，每个人都有失误的时候，不要伤心嘛~”", goto = "xiaoci_hug", modifiers = { "like.渚浔笑辞" = 20 } },
    { text = "安静陪着她", goto = "xiaoci_silent", modifiers = { "like.渚浔笑辞" = 10 } }
]

[[step]]
id = "xiaoci_hug"
text = "笑辞眼眶一红，轻轻靠在你怀里。"
next = "xiaoci_chocolate"

[[step]]
id = "xiaoci_silent"
text = "笑辞轻声说：有你在真好……"
next = "xiaoci_chocolate"

[[step]]
id = "xiaoci_chocolate"
text = """
笑辞拿着亲手做的巧克力，递到你面前。
渚浔笑辞：我最喜欢你了！
渚浔笑辞：以后……我想每天都做料理给你吃！
你紧紧握住她的手，心里满是幸福。
"""

[[step]]
id = "xiaoci_illness"
text = """
然而，好景不长……
几周后，笑辞突然变得异常疲惫，常常头晕、发烧。
你带她去了好几家医院，但所有的检查都显示——
没有发现任何器质性病变，一切指标正常。
医生们束手无策，只能说是“一种奇怪的病”。
笑辞的笑容渐渐消失，她甚至没有力气再进厨房。

你看着她苍白的脸，心如刀绞。
这天晚上，笑辞虚弱地拉着你的手：
渚浔笑辞：我是不是……再也做不了料理给你吃了？
渚浔笑辞：对不起……

【生死攸关的选择】
"""
choices = [
    { text = "疯狂寻找偏方和专家，一定要治好她！", goto = "xiaoci_bad", modifiers = {} },
    { text = "温柔地抱住她，告诉她：“你不需要做任何事，只要你在就好。”", goto = "xiaoci_good", modifiers = {} }
]

[[step]]
id = "xiaoci_bad"
text = """
你像疯了一样到处求医问药。
你带着笑辞跑遍全国，尝试各种偏方、针灸、甚至巫术。
笑辞的身体越来越虚弱，但她不忍心拒绝你的努力。
每次看到你疲惫又焦虑的眼神，她都勉强挤出笑容。
终于有一天，笑辞在去往外地医院的列车上，安静地靠在你肩上……
再也没有醒来。

医生说她是因为长期心力交瘁，加上疾病消耗……
你抱着她冰冷的身体，悔恨的泪水无法停止。
你才明白，你只顾着寻找解药，却忘了给她最需要的——陪伴与安宁。

【结局：失去的太阳】
联盟少了她，再也没有了笑声。
你每天都会去厨房坐一坐，仿佛还能闻到蛋挞的香气。
但那个总是对你笑的小太阳，再也回不来了。
==================================================
           渚浔笑辞 · Bad ENDing 失去的太阳
==================================================
"""
next = "END"

[[step]]
id = "xiaoci_good"
text = """
你轻轻把她揽进怀里，声音温柔而坚定：
“笑辞，你不需要做任何事。你对我来说，比任何料理都重要。”
“从今天起，换我来照顾你。”
笑辞的眼泪一下子涌了出来，她用力地点点头。

你辞去了所有兼职，每天陪在她身边。
你学会了煮粥、炖汤，虽然味道远远比不上她做的。
但每次看到你手忙脚乱的样子，笑辞都会忍不住笑出来。
你给她讲联盟里的趣事，给她看你画的涂鸦。
慢慢地，笑辞的脸色一天天红润起来。
某个清晨，你还在睡梦中，忽然闻到一股熟悉的蛋挞香。
你睁开眼睛，看到笑辞系着围裙，端着金黄的蛋挞站在你床前。
渚浔笑辞：早安～我……好像好了呢。

后来的医生说，这或许是一种“心因性疾病”
当一个人被爱和温柔包围时，身体会自己找到康复的路。

笑辞重新回到了厨房，但这次，她不再一个人忙碌。
你们并肩站在灶台前，火光映着两张幸福的笑脸。
渚浔笑辞：谢谢你……没有放弃我。
渚浔笑辞：以后，我想和你一起做一辈子的料理。

【结局：康复的烟火】
她用笑容温暖你，你用守护治愈她。
厨房里的烟火，成了你们最幸福的日常。
奇怪的病再也没有复发，因为爱就是最好的药。
==================================================
           渚浔笑辞 · Happy ENDing 康复的烟火
==================================================
"""
next = "END"