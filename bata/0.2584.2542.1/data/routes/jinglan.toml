# 加比镜岚（航海少女）·个人线

[[step]]
id = "jinglan_start"
text = """
==================================================
                   加比镜岚 个人线
==================================================
"""

[[step]]
id = "jinglan_begin"
text = "按回车开始……"
next = "jinglan_intro"

[[step]]
id = "jinglan_intro"
text = """
加比镜岚是联盟里最安静的人之一，但她的眼睛里有海。
你第一次注意到她，是在图书馆的角落。
她捧着一本《帆船驾驶入门》，手指轻轻描摹书页上的绳结图样。
夕阳透过窗户，把她侧脸的轮廓镀上一层金色。
她的课桌上永远摆着一只旧帆船模型，那是她父亲年轻时亲手做的。
笔记本的空白处画满了海浪、罗盘和鲸鱼。
她很少和别人说话，但只要你提起“大海”两个字，她的眼睛就会亮起来。
"""

[[step]]
id = "jinglan_choice1"
text = "【选择题：你会怎么回应她的梦想？】"
choices = [
    { text = "好棒啊，我也想和你一起去航海！", goto = "jinglan_enthusiastic", modifiers = { "like.加比镜岚" = 15 } },
    { text = "听起来很危险，你不怕吗？", goto = "jinglan_cautious", modifiers = { "like.加比镜岚" = 5 } }
]

[[step]]
id = "jinglan_enthusiastic"
text = """
镜岚猛地抬起头，瞳孔微微放大：真的吗？
她咬了咬嘴唇，声音有些颤抖：你是第一个……愿意和我一起出海的人。
她从书包里掏出一张皱巴巴的海图，指着一个小岛：我连路线都规划好了。
你们凑在一起看海图，肩膀几乎挨着，你闻到她身上淡淡的椰子香。
"""
next = "jinglan_boat"

[[step]]
id = "jinglan_cautious"
text = """
镜岚低下头，手指无意识地卷着书页的一角。
她轻声说：我知道很危险……但正因为危险，才更想去。
她顿了顿，又补充道：人这一辈子，总得有一次为了什么不顾一切吧。
你看着她倔强的侧脸，心里某个地方被轻轻触动了一下。
"""
next = "jinglan_boat"

[[step]]
id = "jinglan_boat"
text = """
【一起造船】
从那以后，镜岚开始主动找你聊天。
她告诉你，她偷偷攒了三年的零花钱，在二手市场淘到一艘废弃的小帆船。
船停在城市东边的旧码头，破得几乎像一堆烂木头。
但她眼里的光比太阳还耀眼：我们一起把它修好，好吗？
你点头的那一刻，她露出了你见过的第一个真正的笑容。

周末的清晨，你们骑着自行车穿过半个城市来到码头。
空气中弥漫着海腥味和旧木材的霉味。
镜岚挽起袖子，露出纤细但结实的手臂。
她教你辨认桅杆、帆桁、稳向板，教你打八字结和双套结。
你们一起用砂纸打磨船体，木屑飞舞，她的手心磨出了水泡。
你递给她一瓶水，她仰头喝的时候，几滴水顺着下巴滑落。
"""

[[step]]
id = "jinglan_choice2"
text = "【选择题：你看到她手上的伤，会……】"
choices = [
    { text = "轻轻握住她的手，说“别太拼了，我会心疼”", goto = "jinglan_tender", modifiers = { "like.加比镜岚" = 20 } },
    { text = "递给她创可贴，说“下次让我来，你在旁边指挥”", goto = "jinglan_practical", modifiers = { "like.加比镜岚" = 10 } }
]

[[step]]
id = "jinglan_tender"
text = """
镜岚的手微微僵硬，然后慢慢放松。
她的耳尖红得像煮熟的虾，低着头小声说：谢……谢谢。
你帮她贴上创可贴，指尖触碰的瞬间，两个人同时屏住了呼吸。
她忽然笑了：你这个人……真的很温柔呢。
"""
next = "jinglan_eve"

[[step]]
id = "jinglan_practical"
text = """
镜岚接过创可贴，自己笨拙地缠上。
她笑着说：那你可要把打磨的活全包了哦。
你拿起砂纸，卖力地摩擦船板，她在一旁给你递水擦汗。
阳光洒在你们身上，你第一次觉得，汗水也可以是甜的。
"""
next = "jinglan_eve"

[[step]]
id = "jinglan_eve"
text = """
【启航前夜】
三个月后，船终于修好了。
镜岚给船取名为「星芽号」，因为她说，这是联盟给她的勇气。
启航前夜，你们坐在码头边，脚下是轻轻摇晃的船身。
夜空缀满繁星，海浪温柔地拍打着石壁。
镜岚突然问你：你为什么要陪我做这么疯狂的事？
你看着她的眼睛，认真地说：因为你的梦想，就是我的梦想。
她沉默了很久，然后轻轻把头靠在你肩上。
"""

[[step]]
id = "jinglan_sail"
text = """
【启航】
第二天清晨，海面平静得像一面蓝色的镜子。
镜岚解开缆绳，你升起船帆。
星芽号缓缓离开码头，驶向无垠的大海。
镜岚站在船头，海风吹起她的长发，她张开双臂，像一只终于展翅的海鸥。
她回头看你，笑容比阳光还要灿烂：我们出发啦！

前两天的航行如童话般美好。
你们看到了海豚群在船首跳跃，夜晚的荧光海像星河坠落人间。
镜岚教你用六分仪测星，你给她讲联盟里的趣事。
她在航海日志上写道：第二天，天气晴，身边有他。
"""

[[step]]
id = "jinglan_storm"
text = """
【风暴降临】
第三天下午，天空突然暗了下来。
镜岚的脸色变了：坏天气……比预报来得快。
话音未落，第一滴雨砸在你脸上，然后是一阵狂风。
海浪从几米高迅速窜到十几米，像一堵堵黑色的水墙。
镜岚死死握着舵轮，大声喊：快收帆！收帆！
你手忙脚乱地拉绳索，雨水打得你睁不开眼。
一声巨响，主帆被撕裂，帆布碎片像蝴蝶一样飞入风暴中。
船开始剧烈倾斜，海水灌进船舱。
镜岚的脸上分不清是雨水还是泪水，她的声音在风中破碎：对不起……对不起……
"""

[[step]]
id = "jinglan_key_choice"
text = "【关键选择：生死时刻，你会怎么做？】"
choices = [
    { text = "自己穿上救生衣，跳海求生", goto = "jinglan_bad", modifiers = {} },
    { text = "抱住镜岚，说“要活一起活，要死一起死”", goto = "jinglan_good", modifiers = {} }
]

[[step]]
id = "jinglan_bad"
text = """
你颤抖着从舱里翻出救生衣，套在身上。
镜岚看到你的动作，愣了一下，然后眼神里的光灭了。
她没有说话，只是更用力地握住舵轮。
你喊了一声：对不起！然后跳进翻涌的海水中。
冰冷的海水瞬间吞没了你，你拼命浮上水面，回头望去。
星芽号已经倾斜了超过四十度，镜岚依然站在舵轮前，像一棵不肯倒下的树。
一个巨浪拍过来，船被整个掀翻。
你听见镜岚最后的喊声，被风撕成碎片：……路上……小心……

你在海上漂流了整整两天两夜。
嘴唇干裂，皮肤被海水泡得发白，脑子里全是镜岚最后的眼神。
一艘货船救起了你。
你醒来后第一句话是：她呢？
船长沉默地摇了摇头。

搜救队在海面上只找到了破碎的船板、一只浸湿的航海日志，
还有镜岚父亲做的那只旧帆船模型——它被海浪冲上了三十公里外的沙滩。
日志的最后一页，字迹被水晕开，但还能勉强辨认：
“第二天，天气晴，身边有他。我想我可能喜欢上他了。”
你抱着那只模型，跪在沙滩上，哭得像个孩子。
后来的很多年，你每年都会去那片海。
你会带一束白色的雏菊——那是镜岚最喜欢的花。
你对着大海说：对不起，我来晚了。
海浪重复着你的声音，像她在回答。

【结局：沉没的星芽】
镜岚永远留在了她最爱的大海里。
而你，余生都在后悔那个转身跳海的瞬间。
你学会了航海，一个人驾驶着新船走遍了世界。
但你的船上，永远有一个空位，放着那只旧帆船模型。
==================================================
           加比镜岚 · Bad ENDing 沉没的星芽
==================================================
"""
next = "END"

[[step]]
id = "jinglan_good"
text = """
你没有一丝犹豫，冲过去从背后紧紧抱住了镜岚。
她浑身一颤，尖叫道：你疯了吗！会死的！
你把脸贴在她湿透的头发上，大声说：没有你的世界，活着也没意思！
镜岚的身体僵了一秒，然后开始剧烈颤抖。
她咬着牙，把舵轮打到最死，吼道：那就一起死！不对……一起活！
你用一只手抱住她的腰，另一只手拼命往外舀水。
一个巨浪像山一样压下来，船被抛向空中。
你们紧紧抱在一起，旋转、下坠、撞击……
然后，一切都变黑了。

不知过了多久，你感觉有什么温热的东西在舔你的脸。
你艰难地睁开眼睛，是一只白色的海鸟。
阳光刺得你直流泪。你躺在柔软的沙滩上，浑身剧痛。
挣扎着坐起来，发现星芽号搁浅在不远处的礁石旁，船体裂了，但没有沉。
镜岚呢？！
你连滚带爬地四处寻找，终于在椰子树下找到了她。
她昏迷着，额头有血，但胸口还在微微起伏。
你颤抖着把手放在她鼻子下——有呼吸。
你把她抱在怀里，眼泪掉在她苍白的脸上：醒醒……求你了……
镜岚的睫毛动了动，慢慢睁开眼。
她看到你的脸，先是茫然，然后泪水涌了出来。
她虚弱地举起手，轻轻打了一下你的胸口：笨蛋……我们真的活下来了……
你把她抱得更紧，哭得像个孩子：嗯……活下来了。

你们在那个小岛上待了三天。
镜岚用椰壳接雨水，你潜水摸海螺和螃蟹。
晚上，你们并排躺在沙滩上看星星。
镜岚忽然说：你知道吗？在船上的时候，我以为我们要死了。
她侧过脸看你，眼睛里有星光：然后你抱住了我。
她顿了顿，声音轻得像海风：那时候我就想，如果能活下去，我一定要告诉你——
“我喜欢你。”
你的心跳漏了一拍，然后翻过身，轻轻吻了她的额头。
镜岚的脸瞬间红透了，她把脸埋进你的胸口，小声说：讨厌……

第四天，一艘路过的渔船发现了你们升起的烟雾信号。
渔民大叔看到你们牵着手从沙滩走来，笑着说：小情侣遇难了？
镜岚没有反驳，只是把你的手握得更紧了。

回到陆地的那天，镜岚站在码头，看着被拖回来修理的星芽号。
她转过头对你说：下次，我们带卫星电话、应急信标、双倍救生筏。
你笑着点头：还有，再买一艘更大的船。
她摇摇头：不，星芽号不能丢。因为这是我们的船。

【结局：平安归来】
一年后，你们重新修复了星芽号。
这次，船上装满了各种安全设备，还挂了一面新旗子——画着两颗星星和一朵浪花。
你们再次起航，穿越了太平洋，看到了阿拉斯加的极光，也去过大堡礁浮潜。
在每个港口，你们都会寄一张明信片回联盟。
明信片上永远写着同一句话：“平安归来，勿念。”
又过了一年，你们在星芽号的甲板上举办了婚礼。
证婚人是联盟里的所有伙伴，伴郎是那只被救起的小海鸟。
镜岚穿着白色婚纱，海风把她的头纱吹得高高扬起。
她对你说：谢谢你没有松开手。
你对她说：谢谢你带我看见大海。
从此，你们的船上多了一个小小的船舱，挂着两张航海执照和一只旧帆船模型。
每次出海前，你都会对镜岚说：平安回来。
而她总会笑着回答：有你在，我一定会平安。
==================================================
           加比镜岚 · Happy ENDing 平安归来
==================================================
"""
next = "END"