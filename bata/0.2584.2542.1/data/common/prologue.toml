[[step]]
id = "prologue_atmosphere"
text = """
你跟着芷芽走到房间中央，阳光透过百叶窗在地板上投下斑驳的光影。
书架上堆满了泛黄的旧报纸和手写档案，标签上写着「校园怪谈」「旧校舍历史」等字样。
空气中飘着淡淡的茶香和渚浔笑辞带来的曲奇香气，让人莫名安心。

千日坂芷芽把一份社团章程推到你面前：「这是我们的活动记录，以后你也可以一起参与调查。」
你接过文件夹，指尖触到纸张粗糙的质感，上面密密麻麻写着历届社员的笔记。

渚浔笑辞突然从背包里掏出一个粉色便当盒：「对了！尝尝我新烤的曲奇！是抹茶味的哦～」
你接过一块，酥脆的口感在嘴里化开，甜味恰到好处。

小鸟游刘网抱着一摞旧报纸走到你身边，另一只手还在手机上改着代码：「别愣着啦！先从整理这些旧报纸开始吧，我写个脚本帮你快速按日期分类！」
你瞥见她手机屏幕上是简洁的 Python 代码，变量名还带着可爱的颜文字。

加比镜岚默默递过来一副干净的白手套，声音很轻：「避免留下指纹，有些档案很脆弱。」
你接过手套，注意到她指尖也沾着淡淡的墨水痕迹——看来她经常在这里整理资料。

棱斯新耀羽站在窗边，阳光落在她的发梢，她回头对你笑了笑：「我们都很期待你的加入，毕竟……这个社团很久没有新人了。」
她的笑容像阳光一样耀眼，让你原本紧张的心情慢慢平复下来。
"""
next = "prologue_old_photo"

[[step]]
id = "prologue_old_photo"
text = """
就在你翻看旧报纸时，一张泛黄的照片从书页间滑落。
照片上是一群穿着旧校服的学生，站在一栋废弃的教学楼前，背景里的钟楼指针停在午夜12点。
千日坂芷芽捡起照片，眼神变得严肃：「这是30年前的社员，他们在调查旧校舍后就再也没有出现过。」
渚浔笑辞的笑容也淡了下去：「我们一直在找他们的下落，这也是这个社团存在的意义。」
房间里的气氛瞬间变得沉重，所有人的目光都集中在你身上。
"""
next = "prologue_join_resolve"

[[step]]
id = "prologue_join_resolve"
text = """
你握紧了手里的旧报纸，抬头看向大家：“我也想一起帮忙找到真相。”
千日坂芷芽露出了释然的笑容：“欢迎你，正式成为我们的一员。”
渚浔笑辞立刻拍手：“太好了！今晚我请大家喝奶茶！”
小鸟游刘网把电脑屏幕转向你：“我把档案库权限开给你，以后我们一起挖线索！”
加比镜岚轻轻点了点头，眼神里多了一丝温度。
棱斯新耀羽走到你身边，拍了拍你的肩膀：“我们一起，把这个谜团解开。”
"""
next = "prologue_daily_routine"

[[step]]
