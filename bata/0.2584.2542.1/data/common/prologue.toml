芷芽和耀羽一起捡柴火，一边走一边轻声聊天。

夜幕降临，篝火亮了起来。
大家围坐在一起，看着投影里的回忆片段，从第一次见面，到整理资料，到校运会，再到一次次放学后的闲聊。
不知道是谁先轻声开口，气氛慢慢变得温柔又安静。

你看着身边的每一个人，心里渐渐清晰起来。
